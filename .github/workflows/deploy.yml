name: Deploy to GitHub Pages

on:
  # Fires when a human pushes UI changes or feed data directly
  push:
    branches: [main]
    paths:
      - "data/feed.json"
      - "site/**"
  # Fires after the scrape cron commits feed.json via GITHUB_TOKEN.
  # Pushes from GITHUB_TOKEN do not trigger `push` events, so this
  # workflow_run trigger is required for the 6-hourly auto-deploy.
  workflow_run:
    workflows: ["Scrape & score"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Prepare site bundle
        run: |
          mkdir -p _site
          cp site/index.html _site/index.html
          mkdir -p _site/data
          cp data/feed.json     _site/data/feed.json
          cp data/sources.json  _site/data/sources.json
          echo "Site bundle ready:"
          ls -lh _site/ _site/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4.0.5
